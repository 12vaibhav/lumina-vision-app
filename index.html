
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LuminaVision AI | Interior Previewer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Inter', sans-serif;
        background-color: #020617;
        color: #f8fafc;
        overflow-x: hidden;
      }
      h1, h2, h3, h4 {
        font-family: 'Outfit', sans-serif;
      }
      .aurora-bg {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        z-index: -1;
        background: radial-gradient(circle at 50% 50%, #0f172a 0%, #020617 100%);
        overflow: hidden;
      }
      .aurora-container {
        position: absolute;
        top: -50%;
        left: -50%;
        width: 200%;
        height: 200%;
        animation: aurora-rotate 40s linear infinite;
        filter: blur(100px);
        opacity: 0.5;
      }
      .aurora-item {
        position: absolute;
        width: 40%;
        height: 40%;
        border-radius: 50%;
      }
      .aurora-1 { top: 10%; left: 10%; background: #4f46e5; animation: aurora-pulse 10s ease-in-out infinite; }
      .aurora-2 { top: 20%; right: 10%; background: #9333ea; animation: aurora-pulse 12s ease-in-out infinite reverse; }
      .aurora-3 { bottom: 10%; left: 20%; background: #ec4899; animation: aurora-pulse 15s ease-in-out infinite 2s; }
      .aurora-4 { bottom: 20%; right: 20%; background: #06b6d4; animation: aurora-pulse 8s ease-in-out infinite 1s; }

      @keyframes aurora-rotate {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
      @keyframes aurora-pulse {
        0%, 100% { transform: scale(1) translate(0, 0); opacity: 0.6; }
        50% { transform: scale(1.2) translate(10%, 10%); opacity: 0.3; }
      }

      .glass {
        background: rgba(255, 255, 255, 0.02);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid rgba(255, 255, 255, 0.08);
        box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
      }
      .glass-card {
        background: rgba(15, 23, 42, 0.4);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.05);
        transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      }
      .glass-card:hover {
        border-color: rgba(99, 102, 241, 0.3);
        transform: translateY(-4px);
        background: rgba(15, 23, 42, 0.6);
        box-shadow: 0 20px 40px -20px rgba(99, 102, 241, 0.2);
      }
      .text-gradient {
        background: linear-gradient(135deg, #fff 30%, #a5b4fc 70%, #818cf8 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      .reveal {
        opacity: 0;
        transform: translateY(30px);
        transition: all 0.8s cubic-bezier(0.22, 1, 0.36, 1);
      }
      .reveal.active {
        opacity: 1;
        transform: translateY(0);
      }
      
      /* Hide scrollbar but keep functionality */
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: rgba(99, 102, 241, 0.2); border-radius: 10px; }
      ::-webkit-scrollbar-thumb:hover { background: rgba(99, 102, 241, 0.4); }
    </style>
    <script type="importmap">
    {
      "imports": {
        "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
        "react/": "https://esm.sh/react@^19.2.4/",
        "react": "https://esm.sh/react@^19.2.4",
        "@google/genai": "https://esm.sh/@google/genai@^1.41.0",
        "lucide-react": "https://esm.sh/lucide-react@^0.574.0"
      }
    }
    </script>
  <link rel="stylesheet" href="/index.css">
</head>
  <body>
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
